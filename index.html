<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#4fc3f7">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Levi's Log</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a1628;color:#e8edf5;min-height:100vh;display:flex;flex-direction:column;overflow-x:hidden}

/* Tab bar */
.tab-bar{display:flex;background:#0f1f3d;border-top:2px solid #1a3a6a;position:fixed;bottom:0;left:0;right:0;z-index:100;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab-bar::-webkit-scrollbar{display:none}
.tab-btn{flex:0 0 auto;padding:10px 8px;text-align:center;font-size:10px;font-weight:700;color:#5a8abf;background:none;border:none;cursor:pointer;transition:color .2s;min-width:52px}
.tab-btn.active{color:#4fc3f7;border-top:3px solid #4fc3f7}
.tab-icon{font-size:18px;display:block;margin-bottom:2px}

/* Pages */
.page{display:none;padding:12px 12px 80px 12px;flex:1}
.page.active{display:block}

/* Hero header */
.hero{text-align:center;padding:16px 12px 8px;margin-bottom:8px}
.hero-title{font-size:28px;font-weight:900;letter-spacing:2px;background:linear-gradient(135deg,#4fc3f7,#29b6f6,#81d4fa,#4dd0e1);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-shadow:none}
.hero-icons{font-size:22px;letter-spacing:6px;margin-top:4px}
.hero-sub{font-size:11px;color:#5a8abf;margin-top:4px;letter-spacing:1px}

/* Cards */
.card{background:#112240;border-radius:12px;padding:14px;margin-bottom:10px;border:1px solid #1a3a6a}
.card-title{font-weight:700;font-size:15px;margin-bottom:4px}
.card-sub{font-size:12px;color:#5a8abf}

/* Category colors — brighter for kids */
.cat-speech{border-left:4px solid #ff6b6b}
.cat-reading{border-left:4px solid #4fc3f7}
.cat-behavior{border-left:4px solid #ffd54f}
.cat-selfcare{border-left:4px solid #69f0ae}
.cat-academics{border-left:4px solid #ce93d8}
.cat-social{border-left:4px solid #ffab40}

.color-speech{color:#ff6b6b}.color-reading{color:#4fc3f7}.color-behavior{color:#ffd54f}
.color-selfcare{color:#69f0ae}.color-academics{color:#ce93d8}.color-social{color:#ffab40}

.bg-speech{background:#2a1525}.bg-reading{background:#0d2137}.bg-behavior{background:#2a2510}
.bg-selfcare{background:#0d2a1f}.bg-academics{background:#1f1530}.bg-social{background:#2a1f10}

/* Buttons */
.btn{padding:10px 16px;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s}
.btn-primary{background:linear-gradient(135deg,#29b6f6,#4fc3f7);color:#0a1628}.btn-primary:hover{background:linear-gradient(135deg,#0288d1,#29b6f6)}
.btn-secondary{background:#1a3a6a;color:#81d4fa}.btn-secondary:hover{background:#234a7a}
.btn-danger{background:#3a1525;color:#ff6b6b}.btn-danger:hover{background:#4a2535}
.btn-sm{padding:6px 10px;font-size:11px}
.btn-block{display:block;width:100%;margin-top:8px}

/* Forms */
input,select,textarea{background:#0d1f3a;border:1px solid #1a3a6a;border-radius:8px;padding:10px;color:#e8edf5;font-size:14px;width:100%}
input:focus,select:focus,textarea:focus{outline:none;border-color:#4fc3f7;box-shadow:0 0 0 2px rgba(79,195,247,.2)}
label{display:block;font-size:12px;color:#5a8abf;margin:8px 0 4px}
textarea{resize:vertical;min-height:60px}

/* Chips */
.chip-row{display:flex;gap:6px;flex-wrap:wrap;margin:8px 0}
.chip{display:inline-block;padding:6px 12px;border-radius:14px;font-size:12px;cursor:pointer;border:1px solid #1a3a6a;transition:all .2s;user-select:none;color:#81d4fa}
.chip.on{border-color:#4fc3f7;background:#4fc3f7;color:#0a1628}
.chip-speech.on{background:#ff6b6b;border-color:#ff6b6b;color:#fff}
.chip-reading.on{background:#4fc3f7;border-color:#4fc3f7;color:#0a1628}
.chip-behavior.on{background:#ffd54f;border-color:#ffd54f;color:#0a1628}
.chip-selfcare.on{background:#69f0ae;border-color:#69f0ae;color:#0a1628}
.chip-academics.on{background:#ce93d8;border-color:#ce93d8;color:#0a1628}
.chip-social.on{background:#ffab40;border-color:#ffab40;color:#0a1628}

/* Modal */
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(5,10,25,.85);z-index:200;align-items:center;justify-content:center;padding:16px}
.modal-overlay.show{display:flex}
.modal{background:#112240;border:1px solid #1a3a6a;border-radius:14px;padding:20px;width:100%;max-width:400px;max-height:85vh;overflow-y:auto}
.modal h3{margin-bottom:12px;color:#4fc3f7}

/* Toast */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#69f0ae;color:#0a1628;padding:10px 20px;border-radius:10px;font-size:13px;font-weight:700;z-index:300;opacity:0;transition:opacity .3s}
.toast.show{opacity:1}
.toast.error{background:#ff6b6b;color:#fff}

/* Entry cards in daily log */
.log-entry{background:#112240;border:1px solid #1a3a6a;border-radius:12px;padding:12px;margin-bottom:8px;cursor:pointer;transition:all .2s}
.log-entry:hover{background:#152a4a;border-color:#29b6f6}
.log-date{font-weight:700;font-size:14px;margin-bottom:4px}
.log-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px}
.log-tag{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600}

/* Category section within log form */
.cat-section{border-radius:10px;padding:12px;margin-bottom:10px;display:none}
.cat-section.visible{display:block}
.cat-section h4{font-size:13px;font-weight:700;margin-bottom:8px}

/* Goal items */
.goal-item{background:#0d1f3a;border-radius:10px;padding:10px 12px;margin-bottom:6px;display:flex;align-items:flex-start;gap:10px;border:1px solid #1a3a6a}
.goal-item input[type=checkbox]{width:auto;margin-top:3px;accent-color:#4fc3f7}
.goal-text{flex:1}
.goal-title{font-size:13px;font-weight:600}
.goal-desc{font-size:11px;color:#5a8abf;margin-top:2px}
.goal-item.done .goal-title{text-decoration:line-through;color:#3a5a8a}
.goal-progress{display:flex;align-items:center;gap:6px;margin-top:4px}
.goal-bar{flex:1;height:5px;background:#1a3a6a;border-radius:3px;overflow:hidden}
.goal-bar-fill{height:100%;border-radius:3px;transition:width .3s}
.goal-notes{font-size:11px;color:#5a8abf;margin-top:4px}

/* History items in category tabs */
.hist-item{background:#0d1f3a;border-radius:8px;padding:8px 10px;margin-bottom:6px;border:1px solid #1a3a6a}
.hist-date{font-size:10px;color:#5a8abf;margin-bottom:2px}
.hist-text{font-size:13px}
.hist-mood{font-size:11px;margin-top:4px}

/* Insights */
.stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:16px}
.stat-card{background:#112240;border:1px solid #1a3a6a;border-radius:12px;padding:14px;text-align:center}
.stat-val{font-size:24px;font-weight:900;color:#4fc3f7}
.stat-lbl{font-size:11px;color:#5a8abf;margin-top:2px}

.streak-bar{background:#112240;border:1px solid #1a3a6a;border-radius:12px;padding:14px;margin-bottom:10px}
.streak-title{font-size:13px;font-weight:700;margin-bottom:8px;color:#81d4fa}
.streak-dots{display:flex;gap:3px;flex-wrap:wrap}
.streak-dot{width:18px;height:18px;border-radius:4px;background:#1a3a6a;position:relative}
.streak-dot.hit{background:#4fc3f7}
.streak-dot.today{border:2px solid #fff}

/* Section headers */
.section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.section-header h3{font-size:16px}

/* IO bar */
.io-bar{position:fixed;bottom:52px;left:0;right:0;z-index:99;background:#0d1f3a;border-top:1px solid #1a3a6a;display:flex;gap:6px;padding:6px 12px;justify-content:center}
.tab-bar{height:50px}

/* Empty state */
.empty{text-align:center;padding:40px 20px;color:#3a5a8a}
.empty-icon{font-size:40px;margin-bottom:10px}
.empty-text{font-size:14px}

/* Quick add row */
.quick-add{display:flex;gap:6px;margin-bottom:10px}
.quick-add input{flex:1}

/* Rating stars */
.rating{display:flex;gap:4px;margin:4px 0}
.star{font-size:20px;cursor:pointer;color:#1a3a6a;transition:color .2s}
.star.on{color:#ffd54f}

/* Expandable */
.expandable .expand-content{display:none}
.expandable.open .expand-content{display:block}

@media(min-width:600px){
  .stat-grid{grid-template-columns:repeat(4,1fr)}
  .tab-btn{min-width:70px}
}
</style>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;900&display=swap" rel="stylesheet">
</head>
<body>

<div class="io-bar">
  <button class="btn btn-sm btn-secondary" id="btn-export">EXPORT</button>
  <button class="btn btn-sm btn-secondary" id="btn-import">IMPORT</button>
  <input type="file" id="import-file" accept=".json" style="display:none">
</div>

<div class="tab-bar" id="tab-bar">
  <button class="tab-btn active" data-tab="log"><span class="tab-icon">🏠</span>Home</button>
  <button class="tab-btn" data-tab="speech"><span class="tab-icon">🗣</span>Speech</button>
  <button class="tab-btn" data-tab="reading"><span class="tab-icon">📚</span>Reading</button>
  <button class="tab-btn" data-tab="behavior"><span class="tab-icon">⭐</span>Behavior</button>
  <button class="tab-btn" data-tab="selfcare"><span class="tab-icon">🧹</span>Self-Care</button>
  <button class="tab-btn" data-tab="academics"><span class="tab-icon">🔢</span>Academics</button>
  <button class="tab-btn" data-tab="social"><span class="tab-icon">👫</span>Social</button>
</div>

<!-- Dashboard / Home -->
<div id="pg-log" class="page active">
  <div class="hero">
    <div class="hero-icons">⚡ 🐢 🍄 🚀 🎮</div>
    <div class="hero-title">LEVI'S LOG</div>
    <div class="hero-sub">ADVENTURE TRACKER</div>
  </div>
  <div id="dash-scores"></div>
  <button class="btn btn-primary btn-block" id="btn-new-entry" style="font-size:15px;padding:14px;margin-bottom:14px;border-radius:12px;letter-spacing:1px">+ Log Tonight</button>
  <div id="dash-alerts"></div>
  <div id="dash-stats"></div>
  <div id="dash-streak"></div>
  <div id="dash-trend"></div>
  <div id="dash-entries"></div>
</div>

<!-- Category pages -->
<div id="pg-speech" class="page">
  <h3 style="margin-bottom:12px" class="color-speech">Speech & Language</h3>
  <div id="speech-goals"></div>
  <div class="section-header" style="margin-top:16px"><h4>History</h4></div>
  <div id="speech-history"></div>
</div>

<div id="pg-reading" class="page">
  <h3 style="margin-bottom:12px" class="color-reading">Reading</h3>
  <div id="reading-goals"></div>
  <div id="reading-insights"></div>
  <div class="section-header" style="margin-top:16px"><h4>History</h4></div>
  <div id="reading-history"></div>
</div>

<div id="pg-behavior" class="page">
  <h3 style="margin-bottom:12px" class="color-behavior">Behavior & Discipline</h3>
  <div id="behavior-goals"></div>
  <div id="behavior-insights"></div>
  <div class="section-header" style="margin-top:16px"><h4>History</h4></div>
  <div id="behavior-history"></div>
</div>

<div id="pg-selfcare" class="page">
  <h3 style="margin-bottom:12px" class="color-selfcare">Self-Care</h3>
  <div id="selfcare-goals"></div>
  <div id="selfcare-insights"></div>
  <div class="section-header" style="margin-top:16px"><h4>History</h4></div>
  <div id="selfcare-history"></div>
</div>

<div id="pg-academics" class="page">
  <h3 style="margin-bottom:12px" class="color-academics">Academics</h3>
  <div id="academics-goals"></div>
  <div class="section-header" style="margin-top:16px"><h4>History</h4></div>
  <div id="academics-history"></div>
</div>

<div id="pg-social" class="page">
  <h3 style="margin-bottom:12px" class="color-social">Social</h3>
  <div id="social-goals"></div>
  <div class="section-header" style="margin-top:16px"><h4>History</h4></div>
  <div id="social-history"></div>
</div>


<!-- Modal -->
<div id="modal-overlay" class="modal-overlay"><div id="modal-content" class="modal"></div></div>
<div id="toast-el" class="toast"></div>

<script>
// ── Helpers ──
let _uid=0;
function uid(){return Date.now().toString(36)+'_'+(++_uid)}
function esc(s){if(!s)return '';const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function toast(msg,err){const t=document.getElementById('toast-el');t.textContent=msg;t.className='toast'+(err?' error':'')+' show';setTimeout(()=>t.className='toast',2500)}
function today(){return new Date().toISOString().slice(0,10)}
function fmtDate(d){if(!d)return '';const dt=new Date(d+'T12:00:00');return dt.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})}
function daysAgo(d){return Math.floor((new Date()-new Date(d+'T12:00:00'))/(86400000))}

// ── Categories ──
const CATS=[
  {id:'speech',name:'Speech & Language',color:'#ff6b6b',icon:'🗣'},
  {id:'reading',name:'Reading',color:'#4fc3f7',icon:'📚'},
  {id:'behavior',name:'Behavior & Discipline',color:'#ffd54f',icon:'⭐'},
  {id:'selfcare',name:'Self-Care',color:'#69f0ae',icon:'🧹'},
  {id:'academics',name:'Academics',color:'#ce93d8',icon:'🔢'},
  {id:'social',name:'Social',color:'#ffab40',icon:'👫'}
];
function catById(id){return CATS.find(c=>c.id===id)}

// ── State ──
const DEFAULT_STATE={
  entries:[],
  quickTags:{
    speech:['Practiced sound','Read the sound','Speech therapy','New word clear','Conversation practice'],
    behavior:["Wouldn't eat",'Threw a tantrum','Bad at school',"Didn't listen",'Bedtime resistance','Hitting/pushing','Whining','Great day'],
    selfcare:['Wiped well','Needed help wiping','Dressed self','Brushed teeth well','Needed teeth reminder','Washed hands unprompted','Bath/shower independent'],
  },
  goals:[
    // Speech — all longterm, these take months
    {id:uid(),cat:'speech',title:'Clear "th" sounds',desc:'Says "the/that/this" instead of "da/dat/dis"',status:'active',tier:'longterm',reminder:'monthly',notes:[]},
    {id:uid(),cat:'speech',title:'Clear "r" sounds',desc:'Pronounces R clearly in words like "red", "car", "brother"',status:'active',tier:'longterm',reminder:'monthly',notes:[]},
    {id:uid(),cat:'speech',title:'Clear "l" sounds',desc:'Pronounces L clearly in words like "Levi", "like", "ball"',status:'active',tier:'longterm',reminder:'monthly',notes:[]},
    {id:uid(),cat:'speech',title:'Multi-syllable words',desc:'Says longer words clearly without dropping syllables',status:'active',tier:'longterm',reminder:'monthly',notes:[]},
    // Reading
    {id:uid(),cat:'reading',title:'Nightly reading habit',desc:'Consistent bedtime reading sessions',status:'active',tier:'weekly',reminder:'daily',notes:[]},
    {id:uid(),cat:'reading',title:'Recognize alphabet letters',desc:'Can identify all 26 uppercase and lowercase letters',status:'active',tier:'longterm',reminder:'weekly',notes:[]},
    {id:uid(),cat:'reading',title:'Letter sounds',desc:'Knows the sound each letter makes',status:'active',tier:'longterm',reminder:'weekly',notes:[]},
    {id:uid(),cat:'reading',title:'Sight words',desc:'Recognizes common kindergarten sight words (the, and, is, it, etc.)',status:'active',tier:'longterm',reminder:'monthly',notes:[]},
    // Behavior — weekly focus items
    {id:uid(),cat:'behavior',title:'Tantrum management',desc:'Reducing frequency and intensity of tantrums, learning to express frustration with words',status:'active',tier:'weekly',reminder:'daily',notes:[]},
    {id:uid(),cat:'behavior',title:'Listening first time',desc:'Follows instructions without needing to be asked multiple times',status:'active',tier:'weekly',reminder:'daily',notes:[]},
    {id:uid(),cat:'behavior',title:'Patience / waiting',desc:'Can wait his turn, handle short delays without meltdowns',status:'active',tier:'weekly',reminder:'weekly',notes:[]},
    // Self-Care — weekly practice items
    {id:uid(),cat:'selfcare',title:'Wiping independently',desc:'Can wipe consistently and properly after using the bathroom',status:'active',tier:'weekly',reminder:'daily',notes:[]},
    {id:uid(),cat:'selfcare',title:'Dressing independently',desc:'Picks out clothes and dresses himself including buttons/zippers',status:'active',tier:'weekly',reminder:'weekly',notes:[]},
    {id:uid(),cat:'selfcare',title:'Teeth brushing',desc:'Brushes teeth properly with minimal supervision',status:'active',tier:'weekly',reminder:'daily',notes:[]},
    {id:uid(),cat:'selfcare',title:'Hand washing',desc:'Washes hands thoroughly without reminders after bathroom and before meals',status:'active',tier:'weekly',reminder:'weekly',notes:[]},
    // Academics
    {id:uid(),cat:'academics',title:'Count to 20',desc:'Counts objects accurately up to 20',status:'active',tier:'longterm',reminder:'weekly',notes:[]},
    {id:uid(),cat:'academics',title:'Number recognition',desc:'Recognizes written numbers 0-20',status:'active',tier:'longterm',reminder:'weekly',notes:[]},
    {id:uid(),cat:'academics',title:'Basic shapes',desc:'Identifies and names circle, square, triangle, rectangle, star, diamond',status:'active',tier:'longterm',reminder:'monthly',notes:[]},
    {id:uid(),cat:'academics',title:'Colors',desc:'Names all basic colors accurately',status:'active',tier:'weekly',reminder:'weekly',notes:[]},
    {id:uid(),cat:'academics',title:'Write his name',desc:'Can write "Levi" legibly',status:'active',tier:'longterm',reminder:'weekly',notes:[]},
    // Social
    {id:uid(),cat:'social',title:'Sharing with others',desc:'Shares toys and takes turns without major conflicts',status:'active',tier:'weekly',reminder:'weekly',notes:[]},
    {id:uid(),cat:'social',title:'City adjustment',desc:'Comfortable in the neighborhood, feels at home in Canton',status:'active',tier:'longterm',reminder:'monthly',notes:[]},
    {id:uid(),cat:'social',title:'Kindergarten readiness',desc:'Ready for classroom environment — sitting still, following group instructions, interacting with peers',status:'active',tier:'longterm',reminder:'monthly',notes:[]}
  ]
};

let S;
function loadState(){
  try{const raw=localStorage.getItem('levi_dev');if(raw){S=JSON.parse(raw);if(!S.goals)S.goals=DEFAULT_STATE.goals;if(!S.entries)S.entries=[];
    // Migrate: add tier/reminder/flagged to old goals, quickTags
    S.goals.forEach(g=>{if(!g.tier)g.tier='longterm';if(!g.reminder)g.reminder='none';if(g.flagged===undefined)g.flagged=false;});
    if(!S.quickTags)S.quickTags=DEFAULT_STATE.quickTags;
  }else{S=JSON.parse(JSON.stringify(DEFAULT_STATE))}}
  catch(e){S=JSON.parse(JSON.stringify(DEFAULT_STATE))}
}
function saveState(){localStorage.setItem('levi_dev',JSON.stringify(S))}

function isReminderDue(g){
  if(!g.reminder||g.reminder==='none'||g.status==='done')return false;
  const lastNote=g.notes&&g.notes.length?g.notes[g.notes.length-1].date:null;
  if(!lastNote)return true; // never logged, always due
  const d=daysAgo(lastNote);
  if(g.reminder==='daily')return d>=1;
  if(g.reminder==='weekly')return d>=7;
  if(g.reminder==='monthly')return d>=30;
  return false;
}

// ── Tab navigation ──
function initTabs(){
  document.querySelectorAll('.tab-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
      document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
      btn.classList.add('active');
      const tab=btn.dataset.tab;
      document.getElementById('pg-'+tab).classList.add('active');
      renderTab(tab);
    });
  });
}

function renderTab(tab){
  if(tab==='log') renderDashboard();
  else renderCategory(tab);
}

// ── Dashboard ──
function renderDashboard(){
  // Score boxes — last 30 days best-day counts
  const now30=new Date();
  const positiveSCTags=new Set(['Wiped well','Dressed self','Brushed teeth well','Washed hands unprompted','Bath/shower independent']);
  let readingScore=0,behaviorScore=0,selfcareScore=0;
  for(let i=29;i>=0;i--){
    const dt=new Date(now30);dt.setDate(dt.getDate()-i);
    const ds=dt.toISOString().slice(0,10);
    S.entries.forEach(e=>{
      if(e.date!==ds)return;
      e.items.forEach(it=>{
        if(it.cat==='reading'){
          const bks=it.books&&it.books.length?it.books:(it.book?[it.book]:[]);
          if(bks.length>=2)readingScore++;
        }
        if(it.cat==='behavior'&&it.mood==='great')behaviorScore++;
        if(it.cat==='selfcare'&&it.tags&&it.tags.length&&it.tags.every(t=>positiveSCTags.has(t)))selfcareScore++;
      });
    });
  }
  document.getElementById('dash-scores').innerHTML=`
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px">
      <div class="stat-card" style="border:2px solid #ffd54f;cursor:pointer" onclick="document.querySelector('[data-tab=reading]').click()"><div style="font-size:28px">📖</div><div class="stat-val" style="color:#ffd54f;font-size:28px">${readingScore}/10</div><div class="stat-lbl">2+ Books</div></div>
      <div class="stat-card" style="border:2px solid #69f0ae;cursor:pointer" onclick="document.querySelector('[data-tab=behavior]').click()"><div style="font-size:28px">⭐</div><div class="stat-val" style="color:#69f0ae;font-size:28px">${behaviorScore}/10</div><div class="stat-lbl">Great Days</div></div>
      <div class="stat-card" style="border:2px solid #69f0ae;cursor:pointer" onclick="document.querySelector('[data-tab=selfcare]').click()"><div style="font-size:28px">💪</div><div class="stat-val" style="color:#69f0ae;font-size:28px">${selfcareScore}/10</div><div class="stat-lbl">Independent</div></div>
    </div>`;

  const alertsEl=document.getElementById('dash-alerts');
  let alertsHtml='';

  // Flagged goals — manual priority picks
  const flagged=S.goals.filter(g=>g.status==='active'&&g.flagged);
  if(flagged.length){
    const flagCards=flagged.map(g=>{
      const cat=catById(g.cat);
      const lastNote=g.notes&&g.notes.length?g.notes[g.notes.length-1]:null;
      const noteInfo=lastNote?'Last: '+fmtDate(lastNote.date):'No notes yet';
      return `<div class="goal-item card cat-${g.cat}" onclick="viewGoal('${g.id}')" style="margin-bottom:4px">
        <div class="goal-text">
          <div style="font-size:11px;color:${cat.color};font-weight:600">${cat.icon} ${cat.name}</div>
          <div class="goal-title"><span style="color:#4fc3f7">⚑</span> ${esc(g.title)}</div>
          <div style="font-size:10px;color:#5a8abf;margin-top:2px">${noteInfo}</div>
        </div>
      </div>`;
    });
    alertsHtml+=`<div style="margin-bottom:14px">
      <div style="font-size:12px;font-weight:700;color:#4fc3f7;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px">⚑ Priority (${flagged.length})</div>
      ${flagCards.join('')}
    </div>`;
  }

  // Needs attention — reminder-overdue, collapsible
  const dueGoals=S.goals.filter(g=>g.status==='active'&&!g.flagged&&isReminderDue(g));
  if(dueGoals.length){
    const dueCards=dueGoals.map(g=>{
      const cat=catById(g.cat);
      const lastNote=g.notes&&g.notes.length?g.notes[g.notes.length-1]:null;
      const ago=lastNote?daysAgo(lastNote.date)+' days ago':'never logged';
      return `<div class="goal-item card cat-${g.cat}" onclick="viewGoal('${g.id}')" style="margin-bottom:4px">
        <div class="goal-text">
          <div style="font-size:11px;color:${cat.color};font-weight:600">${cat.icon} ${cat.name}</div>
          <div class="goal-title">${esc(g.title)}</div>
          <div style="font-size:10px;color:#ffd54f;margin-top:2px">Last update: ${ago}</div>
        </div>
      </div>`;
    });
    alertsHtml+=renderCollapsible('dash_due','Needs Attention ('+dueGoals.length+')',dueCards,3);
  }

  if(!flagged.length&&!dueGoals.length&&S.goals.filter(g=>g.status==='active').length){
    alertsHtml='<div class="card" style="margin-bottom:14px;text-align:center;color:#69f0ae;font-size:13px;font-weight:600">All caught up ✓</div>';
  }

  alertsEl.innerHTML=alertsHtml;
  if(_expandedSections.has('dash_due')){
    const o=document.getElementById('sec-overflow-dash_due');
    const t=document.getElementById('sec-toggle-dash_due');
    if(o)o.style.display='block';
    if(t)t.textContent='collapse';
  }

  // Stats — active goals, logging streak, categories active this week
  const activeGoals=S.goals.filter(g=>g.status==='active').length;
  const completedGoals=S.goals.filter(g=>g.status==='done').length;
  let logStreak=0;
  {let d=new Date();while(true){const ds=d.toISOString().slice(0,10);if(S.entries.some(e=>e.date===ds)){logStreak++;d.setDate(d.getDate()-1)}else break}}
  const last7=new Set();
  {const now=new Date();for(let i=0;i<7;i++){const dt=new Date(now);dt.setDate(dt.getDate()-i);const ds=dt.toISOString().slice(0,10);S.entries.filter(e=>e.date===ds).forEach(e=>e.items.forEach(it=>last7.add(it.cat)))}}

  document.getElementById('dash-stats').innerHTML=`
    <div class="stat-grid" style="margin-bottom:14px">
      <div class="stat-card"><div class="stat-val">${logStreak}</div><div class="stat-lbl">Day Streak</div></div>
      <div class="stat-card"><div class="stat-val">${last7.size}/6</div><div class="stat-lbl">Active This Week</div></div>
      <div class="stat-card"><div class="stat-val">${activeGoals}</div><div class="stat-lbl">Active Goals</div></div>
      <div class="stat-card"><div class="stat-val">${completedGoals}</div><div class="stat-lbl">Completed</div></div>
    </div>`;

  // 30-day category activity grid — each day shows which cats were logged, click to expand
  const last30=[];
  const now=new Date();
  const entriesByDate={};
  S.entries.forEach(e=>{entriesByDate[e.date]=e});
  for(let i=29;i>=0;i--){
    const dt=new Date(now);dt.setDate(dt.getDate()-i);
    const ds=dt.toISOString().slice(0,10);
    const entry=entriesByDate[ds];
    const cats=entry?[...new Set(entry.items.map(it=>it.cat))]:[];
    last30.push({date:ds,cats,entryId:entry?entry.id:null,isToday:i===0});
  }
  const catColors={speech:'#ff6b6b',reading:'#4fc3f7',behavior:'#ffd54f',selfcare:'#69f0ae',academics:'#ce93d8',social:'#ffab40'};
  const allCatIds=['speech','reading','behavior','selfcare','academics','social'];

  // Build stacked bars — 3 rows of 10
  const barHeight=48;
  const rows=[[],[],[]];
  last30.forEach((x,i)=>rows[Math.floor(i/10)].push(x));

  const rowsHtml=rows.map(row=>{
    const bars=row.map(x=>{
      const dayNum=new Date(x.date+'T12:00:00').getDate();
      const click=x.entryId?`onclick="viewEntry('${x.entryId}')"`:''
      const cursor=x.entryId?'pointer':'default';
      if(!x.cats.length){
        return `<div style="display:flex;flex-direction:column;align-items:center;gap:1px;cursor:${cursor}" ${click} title="${x.date} — no entry">
          <div style="width:100%;height:${barHeight}px;background:#1a3a6a;border-radius:3px${x.isToday?';border:2px solid #fff':''}"></div>
          <span style="font-size:8px;color:#3a5a8a">${dayNum}</span>
        </div>`;
      }
      const segH=Math.floor(barHeight/x.cats.length);
      const segs=x.cats.map(c=>`<div style="width:100%;height:${segH}px;background:${catColors[c]}"></div>`).join('');
      return `<div style="display:flex;flex-direction:column;align-items:center;gap:1px;cursor:${cursor}" ${click} title="${x.date} — ${x.cats.join(', ')}">
        <div style="width:100%;height:${barHeight}px;border-radius:3px;overflow:hidden;display:flex;flex-direction:column${x.isToday?';border:2px solid #fff':''}">${segs}</div>
        <span style="font-size:8px;color:#6a9fd8">${dayNum}</span>
      </div>`;
    }).join('');
    return `<div style="display:grid;grid-template-columns:repeat(10,1fr);gap:3px;margin-bottom:4px">${bars}</div>`;
  }).join('');

  const catLegend=CATS.map(c=>`<span style="display:inline-flex;align-items:center;gap:3px;font-size:10px;color:#5a8abf"><span style="width:10px;height:10px;border-radius:2px;background:${c.color};display:inline-block"></span>${c.icon} ${c.name}</span>`).join(' ');

  document.getElementById('dash-streak').innerHTML=`
    <div class="streak-bar" style="margin-bottom:14px">
      <div class="streak-title">Last 30 Days</div>
      ${rowsHtml}
      <div style="margin-top:6px;display:flex;gap:6px;flex-wrap:wrap">${catLegend}</div>
    </div>`;

  // Behavior trend
  const moodEntries=[];
  S.entries.forEach(e=>{
    e.items.forEach(i=>{
      if(i.cat==='behavior'&&i.mood)moodEntries.push({date:e.date,mood:i.mood});
    });
  });
  if(moodEntries.length>=3){
    const recent=moodEntries.slice(-5);
    const moodScore={great:5,good:4,okay:3,rough:2,tough:1};
    const avg=recent.reduce((s,m)=>s+(moodScore[m.mood]||3),0)/recent.length;
    const trend=avg>=4?'Trending great 😄':avg>=3?'Mostly good 🙂':avg>=2?'Some rough patches 😟':'Tough stretch 😤';
    document.getElementById('dash-trend').innerHTML=`<div class="card" style="margin-bottom:14px"><div class="card-title">Behavior</div><div style="font-size:13px;margin-top:4px">${trend}</div></div>`;
  }else{
    document.getElementById('dash-trend').innerHTML='';
  }

  // Recent entries
  const sorted=[...S.entries].sort((a,b)=>b.date.localeCompare(a.date));
  const entriesEl=document.getElementById('dash-entries');
  if(!sorted.length){
    entriesEl.innerHTML='';
    return;
  }
  const entryCards=sorted.map(e=>{
    const cats=[...new Set(e.items.map(i=>i.cat))];
    const tags=cats.map(c=>{const cat=catById(c);return `<span class="log-tag bg-${c}" style="color:${cat.color}">${cat.icon} ${cat.name}</span>`}).join('');
    const itemPreview=e.items.slice(0,3).map(i=>{
      const parts=[];
      if(i.tags&&i.tags.length)parts.push(i.tags.join(', '));
      if(i.text)parts.push(i.text);
      if(i.books&&i.books.length)parts.push('📖 '+i.books.join(', '));
      else if(i.book)parts.push('📖 '+i.book);
      return esc(parts.join(' — '))||esc(i.mood||'');
    }).join(' · ');
    return `<div class="log-entry" onclick="viewEntry('${e.id}')">
      <div class="log-date">${fmtDate(e.date)}</div>
      <div style="font-size:12px;color:#6a9fd8;margin-top:2px">${esc(itemPreview)}${e.items.length>3?' ...':''}</div>
      <div class="log-tags">${tags}</div>
    </div>`;
  });
  entriesEl.innerHTML=renderCollapsible('dailylog','Recent Entries',entryCards,2);
  if(_expandedSections.has('dailylog')){
    const o=document.getElementById('sec-overflow-dailylog');
    const t=document.getElementById('sec-toggle-dailylog');
    if(o)o.style.display='block';
    if(t)t.textContent='collapse';
  }
}

function viewEntry(id){
  const e=S.entries.find(x=>x.id===id);
  if(!e)return;
  const items=e.items.map(i=>{
    const cat=catById(i.cat);
    const tagHtml=i.tags&&i.tags.length?`<div style="display:flex;gap:3px;flex-wrap:wrap;margin-top:4px">${i.tags.map(t=>`<span style="font-size:10px;background:#1a3a6a;padding:2px 6px;border-radius:4px">${esc(t)}</span>`).join('')}</div>`:'';
    return `<div class="card cat-${i.cat}" style="margin-bottom:6px">
      <div style="font-size:11px;font-weight:600;margin-bottom:4px" class="color-${i.cat}">${cat.icon} ${cat.name}</div>
      ${tagHtml}
      ${i.text?`<div style="font-size:13px;margin-top:4px">${esc(i.text)}</div>`:''}
      ${i.books&&i.books.length?`<div style="font-size:11px;color:#4fc3f7;margin-top:4px">${i.books.map(b=>'📖 '+esc(b)).join(' · ')}</div>`:(i.book?`<div style="font-size:11px;color:#5a8abf;margin-top:4px">📖 ${esc(i.book)}</div>`:'')}
      ${i.mood?`<div style="font-size:11px;margin-top:4px">${moodEmoji(i.mood)} ${i.mood}</div>`:''}
    </div>`;
  }).join('');
  showModal(`<h3>${fmtDate(e.date)}</h3>
    ${e.summary?`<div style="font-size:13px;color:#6a9fd8;margin-bottom:12px">${esc(e.summary)}</div>`:''}
    ${items}
    <div style="display:flex;gap:6px;margin-top:12px">
      <button class="btn btn-sm btn-secondary" style="flex:1" onclick="editEntry('${e.id}')">Edit</button>
      <button class="btn btn-sm btn-danger" onclick="deleteEntry('${e.id}')">Delete</button>
    </div>`);
}

function deleteEntry(id){
  if(!confirm('Delete this entry?'))return;
  S.entries=S.entries.filter(e=>e.id!==id);
  saveState();closeModal();renderDashboard();toast('Entry deleted');
}

function moodEmoji(m){
  const map={great:'😄',good:'🙂',okay:'😐',rough:'😟',tough:'😤'};
  return map[m]||'';
}

// ── New Entry Form ──
document.getElementById('btn-new-entry').addEventListener('click',()=>openEntryForm());

function getPastBooks(){
  const books=[];
  S.entries.forEach(e=>e.items.forEach(i=>{
    if(i.books&&i.books.length){i.books.forEach(b=>{if(b&&!books.includes(b))books.push(b)})}
    else if(i.book&&!books.includes(i.book))books.push(i.book);
  }));
  return books;
}

function getBookCounts(){
  const counts={};
  S.entries.forEach(e=>e.items.forEach(i=>{
    if(i.books&&i.books.length){i.books.forEach(b=>{if(b)counts[b]=(counts[b]||0)+1})}
    else if(i.book){counts[i.book]=(counts[i.book]||0)+1}
  }));
  return Object.entries(counts).sort((a,b)=>b[1]-a[1]);
}

function buildQuickTags(catId,existingTags){
  const tags=S.quickTags&&S.quickTags[catId]?S.quickTags[catId]:[];
  if(!tags.length)return '';
  const selected=new Set(existingTags||[]);
  return `<label>Quick tags</label>
    <div class="chip-row qt-row" data-cat="${catId}">
      ${tags.map(t=>`<span class="chip ${selected.has(t)?'on':''}" data-tag="${esc(t)}">${esc(t)}</span>`).join('')}
    </div>
    <div style="display:flex;gap:4px;margin-top:4px">
      <input type="text" class="qt-new" data-cat="${catId}" placeholder="+ custom tag" style="font-size:11px;padding:6px">
      <button class="btn btn-sm btn-secondary qt-add-btn" data-cat="${catId}" style="white-space:nowrap">Add</button>
    </div>`;
}

function openEntryForm(existing){
  const e=existing||{id:null,date:today(),items:[],summary:''};
  const isEdit=!!existing;

  const activeCats=new Set(e.items.map(i=>i.cat));

  let catChips=CATS.map(c=>`<span class="chip chip-${c.id} ${activeCats.has(c.id)?'on':''}" data-cat="${c.id}">${c.icon} ${c.name}</span>`).join('');

  const pastBooks=getPastBooks();

  let catSections=CATS.map(c=>{
    const item=e.items.find(i=>i.cat===c.id)||{};
    const existingTags=item.tags||[];

    // Reading: multi-book support with autocomplete
    let extra='';
    if(c.id==='reading'){
      const existingBooks=item.books||( item.book?[item.book]:[]);
      extra=`<label>Books read tonight</label>
        <div class="books-list" data-cat="${c.id}">
          ${existingBooks.map(b=>`<div class="book-chip" style="display:inline-flex;align-items:center;gap:4px;background:#1a2a3a;color:#4fc3f7;padding:4px 8px;border-radius:6px;margin:2px;font-size:12px"><span>${esc(b)}</span><span class="book-remove" style="cursor:pointer;color:#ff6b6b" onclick="this.parentElement.remove()">✕</span></div>`).join('')}
        </div>
        <div style="display:flex;gap:4px;margin-top:4px">
          <input type="text" class="cat-book-input" data-cat="${c.id}" placeholder="Book title..." list="book-list" autocomplete="off" style="font-size:12px;padding:6px">
          <button class="btn btn-sm btn-secondary book-add-btn" data-cat="${c.id}" style="white-space:nowrap">+ Book</button>
        </div>
        <datalist id="book-list">${pastBooks.map(b=>`<option value="${esc(b)}">`).join('')}</datalist>`;
    }

    // Quick tags for speech, behavior, selfcare
    const quickTagHtml=buildQuickTags(c.id,existingTags);

    // Mood for behavior
    const moodOpts=c.id==='behavior'?`<label>How was today?</label>
      <div class="rating-row" data-cat="${c.id}" style="display:flex;gap:6px;margin:4px 0;flex-wrap:wrap">
        ${['great','good','okay','rough','tough'].map(m=>`<span class="chip ${item.mood===m?'on':''}" data-mood="${m}">${moodEmoji(m)} ${m}</span>`).join('')}
      </div>`:'';

    return `<div class="cat-section bg-${c.id} ${activeCats.has(c.id)?'visible':''}" data-cat="${c.id}">
      <h4 class="color-${c.id}">${c.icon} ${c.name}</h4>
      ${extra}
      ${quickTagHtml}
      ${moodOpts}
      <label>Notes (optional)</label>
      <textarea class="cat-notes" data-cat="${c.id}" placeholder="Anything specific?">${esc(item.text||'')}</textarea>
    </div>`;
  }).join('');

  showModal(`<h3>${isEdit?'Edit':'New'} Entry</h3>
    <label>Date</label>
    <input type="date" id="entry-date" value="${e.date}">
    <label>What categories are relevant tonight?</label>
    <div class="chip-row" id="cat-chips">${catChips}</div>
    <div id="cat-sections">${catSections}</div>
    <label>Overall notes (optional)</label>
    <textarea id="entry-summary" placeholder="Anything else about today?">${esc(e.summary||'')}</textarea>
    <button class="btn btn-primary btn-block" id="btn-save-entry">${isEdit?'Update':'Save'} Entry</button>`);

  // Category chip toggles
  document.querySelectorAll('#cat-chips .chip').forEach(chip=>{
    chip.addEventListener('click',()=>{
      chip.classList.toggle('on');
      const cat=chip.dataset.cat;
      const section=document.querySelector(`.cat-section[data-cat="${cat}"]`);
      section.classList.toggle('visible',chip.classList.contains('on'));
    });
  });

  // Quick tag chip toggles (multi-select)
  document.querySelectorAll('.qt-row .chip').forEach(chip=>{
    chip.addEventListener('click',()=>chip.classList.toggle('on'));
  });

  // Add custom quick tag buttons
  document.querySelectorAll('.qt-add-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const cat=btn.dataset.cat;
      const input=document.querySelector(`.qt-new[data-cat="${cat}"]`);
      const val=input.value.trim();
      if(!val)return;
      if(!S.quickTags[cat])S.quickTags[cat]=[];
      if(!S.quickTags[cat].includes(val)){
        S.quickTags[cat].push(val);
        saveState();
      }
      // Add chip to row as selected
      const row=document.querySelector(`.qt-row[data-cat="${cat}"]`);
      const newChip=document.createElement('span');
      newChip.className='chip on';
      newChip.dataset.tag=val;
      newChip.textContent=val;
      newChip.addEventListener('click',()=>newChip.classList.toggle('on'));
      row.appendChild(newChip);
      input.value='';
      toast('Tag added');
    });
  });

  // Book add buttons
  document.querySelectorAll('.book-add-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const cat=btn.dataset.cat;
      const input=document.querySelector(`.cat-book-input[data-cat="${cat}"]`);
      const val=input.value.trim();
      if(!val)return;
      const list=document.querySelector(`.books-list[data-cat="${cat}"]`);
      const chip=document.createElement('div');
      chip.className='book-chip';
      chip.style.cssText='display:inline-flex;align-items:center;gap:4px;background:#1a2a3a;color:#4fc3f7;padding:4px 8px;border-radius:6px;margin:2px;font-size:12px';
      chip.innerHTML=`<span>${esc(val)}</span><span class="book-remove" style="cursor:pointer;color:#ff6b6b" onclick="this.parentElement.remove()">✕</span>`;
      list.appendChild(chip);
      input.value='';
      input.focus();
    });
  });

  // Mood chips
  document.querySelectorAll('.rating-row').forEach(row=>{
    row.querySelectorAll('.chip').forEach(chip=>{
      chip.addEventListener('click',()=>{
        row.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));
        chip.classList.toggle('on');
      });
    });
  });

  // Save
  document.getElementById('btn-save-entry').addEventListener('click',()=>{
    const date=document.getElementById('entry-date').value;
    if(!date){toast('Pick a date',true);return}

    const items=[];
    document.querySelectorAll('#cat-chips .chip.on').forEach(chip=>{
      const cat=chip.dataset.cat;
      const notes=document.querySelector(`.cat-notes[data-cat="${cat}"]`).value.trim();
      // Multi-book support
      const booksList=document.querySelector(`.books-list[data-cat="${cat}"]`);
      const books=[];
      if(booksList){booksList.querySelectorAll('.book-chip span:first-child').forEach(s=>books.push(s.textContent.trim()))}
      const moodRow=document.querySelector(`.rating-row[data-cat="${cat}"]`);
      const moodChip=moodRow?moodRow.querySelector('.chip.on'):null;
      const mood=moodChip?moodChip.dataset.mood:'';
      // Gather selected quick tags
      const tags=[];
      document.querySelectorAll(`.qt-row[data-cat="${cat}"] .chip.on`).forEach(tc=>tags.push(tc.dataset.tag));
      if(notes||books.length||mood||tags.length){
        items.push({cat,text:notes,books,mood,tags});
      }
    });

    if(!items.length){toast('Add notes or tags to at least one category',true);return}

    const summary=document.getElementById('entry-summary').value.trim();

    if(isEdit){
      const idx=S.entries.findIndex(x=>x.id===e.id);
      if(idx>=0){S.entries[idx]={...S.entries[idx],date,items,summary}}
    }else{
      S.entries.push({id:uid(),date,items,summary});
    }
    saveState();closeModal();renderDashboard();
    toast(isEdit?'Entry updated':'Entry saved');
  });
}

function editEntry(id){
  closeModal();
  const e=S.entries.find(x=>x.id===id);
  if(e)setTimeout(()=>openEntryForm(e),100);
}

// ── Category Pages ──
function renderCategory(cat){
  if(cat==='reading')renderReadingInsights();
  if(cat==='behavior')renderBehaviorInsights();
  if(cat==='selfcare')renderSelfcareInsights();
  renderGoals(cat);
  renderHistory(cat);
}

function renderGoalCard(g,cat){
  const noteCount=g.notes?g.notes.length:0;
  const lastNote=noteCount?g.notes[g.notes.length-1]:'';
  const due=isReminderDue(g);
  const isDone=g.status==='done';
  return `<div class="goal-item card cat-${cat}${isDone?' done':''}" onclick="viewGoal('${g.id}')" style="${isDone?'opacity:.5':''}">
    <div class="goal-text">
      <div class="goal-title">${g.flagged?'<span style="color:#4fc3f7">⚑ </span>':''}${esc(g.title)}${due?' <span style="color:#ffd54f;font-size:10px;font-weight:700">● NEEDS UPDATE</span>':''}</div>
      ${!isDone?`<div class="goal-desc">${esc(g.desc)}</div>`:''}
      ${lastNote&&!isDone?`<div class="goal-notes">Latest: ${esc(lastNote.text)} (${fmtDate(lastNote.date)})</div>`:''}
      ${noteCount&&!isDone?`<div style="font-size:10px;color:#3a5a8a;margin-top:2px">${noteCount} note${noteCount>1?'s':''}${g.reminder&&g.reminder!=='none'?' · remind '+g.reminder:''}</div>`:''}
    </div>
  </div>`;
}

function renderCollapsible(id,title,items,defaultShow){
  if(!items.length)return '';
  const count=items.length;
  const show=defaultShow||3;
  const needsExpand=count>show;
  return `<div class="collapsible-section" id="sec-${id}">
    <div style="display:flex;justify-content:space-between;align-items:center;margin:12px 0 6px;cursor:pointer" onclick="toggleSection('${id}')">
      <span style="font-size:12px;font-weight:700;color:#5a8abf;text-transform:uppercase;letter-spacing:1px">${title} (${count})</span>
      ${needsExpand?'<span style="font-size:11px;color:#4fc3f7" id="sec-toggle-'+id+'">show all</span>':''}
    </div>
    <div class="sec-items" id="sec-items-${id}">
      ${items.slice(0,show).join('')}
    </div>
    ${needsExpand?`<div class="sec-overflow" id="sec-overflow-${id}" style="display:none">${items.slice(show).join('')}</div>`:''}
  </div>`;
}

const _expandedSections=new Set();
function toggleSection(id){
  const overflow=document.getElementById('sec-overflow-'+id);
  const toggle=document.getElementById('sec-toggle-'+id);
  if(!overflow||!toggle)return;
  if(_expandedSections.has(id)){
    _expandedSections.delete(id);
    overflow.style.display='none';
    toggle.textContent='show all';
  }else{
    _expandedSections.add(id);
    overflow.style.display='block';
    toggle.textContent='collapse';
  }
}

function renderGoals(cat){
  const el=document.getElementById(cat+'-goals');
  const goals=S.goals.filter(g=>g.cat===cat);

  const weekly=goals.filter(g=>g.status==='active'&&g.tier==='weekly');
  const longterm=goals.filter(g=>g.status==='active'&&g.tier==='longterm');
  const done=goals.filter(g=>g.status==='done');

  // Sort: reminder-due goals first within each tier
  const sortDue=(a,b)=>(isReminderDue(b)?1:0)-(isReminderDue(a)?1:0);
  weekly.sort(sortDue);
  longterm.sort(sortDue);

  let html=`<div class="section-header"><h4>Goals</h4><button class="btn btn-sm btn-primary" onclick="addGoal('${cat}')">+ Add</button></div>`;

  if(!weekly.length&&!longterm.length&&!done.length){
    html+=`<div class="empty"><div class="empty-text">No goals yet. Add one to start tracking.</div></div>`;
  }

  const wKey=cat+'_weekly';
  const lKey=cat+'_longterm';
  const dKey=cat+'_done';

  html+=renderCollapsible(wKey,'Weekly Focus',weekly.map(g=>renderGoalCard(g,cat)),3);
  html+=renderCollapsible(lKey,'Long-term',longterm.map(g=>renderGoalCard(g,cat)),3);
  html+=renderCollapsible(dKey,'Completed',done.map(g=>renderGoalCard(g,cat)),3);

  el.innerHTML=html;

  // Restore expanded state
  [wKey,lKey,dKey].forEach(k=>{
    if(_expandedSections.has(k)){
      const o=document.getElementById('sec-overflow-'+k);
      const t=document.getElementById('sec-toggle-'+k);
      if(o)o.style.display='block';
      if(t)t.textContent='collapse';
    }
  });
}

      <div style="font-size:11px;color:#5a8abf;font-weight:600;margin-bottom:6px">Top issues (last 30 days)</div>
      ${sortedTags.map(([tag,count])=>{

    <div style="display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap">

      <button class="btn btn-sm ${g.flagged?'btn-primary':'btn-secondary'}" onclick="toggleFlag('${g.id}')" style="min-width:90px">${g.flagged?'⚑ Flagged':'⚐ Flag'}</button>
    </div>
    <label>Add a progress note</label>
    <div style="display:flex;gap:6px">
      <input type="text" id="goal-note-input" placeholder="What happened?">

function toggleGoalStatus(id){
  const g=S.goals.find(x=>x.id===id);
  if(!g)return;
  g.status=g.status==='active'?'done':'active';
  if(g.status==='done')g.flagged=false;
  saveState();
  document.getElementById('modal-overlay').classList.remove('show');
  renderCategory(g.cat);
  toast(g.status==='done'?'Goal completed!':'Goal reactivated');
}

function toggleFlag(id){
  const g=S.goals.find(x=>x.id===id);
  if(!g)return;
  g.flagged=!g.flagged;
  saveState();
  viewGoal(id);
  toast(g.flagged?'Goal flagged':'Flag removed');
}

function addGoalNote(id){
  const g=S.goals.find(x=>x.id===id);
  if(!g)return;
  const input=document.getElementById('goal-note-input');
  const text=input.value.trim();
  if(!text){toast('Enter a note',true);return}
  if(!g.notes)g.notes=[];
  g.notes.push({date:today(),text});
  saveState();
  viewGoal(id);
  toast('Note added');
}

function saveNewGoal(cat){

}

function editGoalPrompt(id){
  const g=S.goals.find(x=>x.id===id);
  if(!g)return;
  showModal(`<h3>Edit Goal</h3>
    <label>Title</label>
    <input type="text" id="edit-goal-title" value="${esc(g.title)}">
    <label>Description</label>
    <textarea id="edit-goal-desc">${esc(g.desc)}</textarea>
    <label>Tier</label>
    <select id="edit-goal-tier">
      <option value="weekly" ${g.tier==='weekly'?'selected':''}>Weekly Focus</option>
      <option value="longterm" ${g.tier==='longterm'?'selected':''}>Long-term</option>
    </select>
    <label>Reminder</label>
    <select id="edit-goal-reminder">
      <option value="none" ${g.reminder==='none'?'selected':''}>No reminder</option>
      <option value="daily" ${g.reminder==='daily'?'selected':''}>Daily</option>
      <option value="weekly" ${g.reminder==='weekly'?'selected':''}>Weekly</option>
      <option value="monthly" ${g.reminder==='monthly'?'selected':''}>Monthly</option>
    </select>
    <button class="btn btn-primary btn-block" onclick="saveEditGoal('${g.id}')">Update</button>`);
}

function saveEditGoal(id){
  const g=S.goals.find(x=>x.id===id);
  if(!g)return;
  g.title=document.getElementById('edit-goal-title').value.trim();
  g.desc=document.getElementById('edit-goal-desc').value.trim();
  g.tier=document.getElementById('edit-goal-tier').value;
  g.reminder=document.getElementById('edit-goal-reminder').value;
  saveState();closeModal();renderCategory(g.cat);toast('Goal updated');
}

function deleteGoal(id){
  if(!confirm('Delete this goal and all its notes?'))return;
  const cat=S.goals.find(g=>g.id===id)?.cat;
  S.goals=S.goals.filter(g=>g.id!==id);
  saveState();closeModal();if(cat)renderCategory(cat);toast('Goal deleted');
}


// ── Modal ──
function showModal(html){
  document.getElementById('modal-content').innerHTML=html;
  document.getElementById('modal-overlay').classList.add('show');
}
function closeModal(){
  document.getElementById('modal-overlay').classList.remove('show');
}
document.getElementById('modal-overlay').addEventListener('click',e=>{
  if(e.target===document.getElementById('modal-overlay'))closeModal();
});

// ── Export/Import ──
document.getElementById('btn-export').addEventListener('click',()=>{
  const blob=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`levi-tracker-${today()}.json`;
  a.click();
  toast('Data exported');
});

document.getElementById('btn-import').addEventListener('click',()=>{
  document.getElementById('import-file').click();
});

document.getElementById('import-file').addEventListener('change',e=>{
  const file=e.target.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const data=JSON.parse(ev.target.result);
      if(!data.entries&&!data.goals){toast('Invalid file',true);return}
      S=data;
      saveState();
      renderTab('log');
      toast('Data imported');
    }catch(err){toast('Import failed',true)}
  };
  reader.readAsText(file);
  e.target.value='';
});

// ── Init ──
loadState();
initTabs();
renderDashboard();
</script>
</body>
</html>
